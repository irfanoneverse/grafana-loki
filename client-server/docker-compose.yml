# =============================================================================
# Docker Compose — Monitoring Agent Stack (Laravel App EC2)
# =============================================================================
# Deploys the observability agent (Grafana Alloy) as a Docker container
# on each Laravel EC2 instance.
#
# WHAT THIS DOES:
#   - Runs Alloy in Docker to collect logs and metrics
#   - Leaves your Laravel app (Nginx, PHP-FPM) running natively via systemctl
#   - If monitoring breaks: `docker compose down` — app is completely unaffected
#
# WHAT THIS DOES NOT DO:
#   - Does NOT containerize Nginx, PHP-FPM, or your Laravel app
#   - Does NOT require any changes to your application code
#
# PREREQUISITES:
#   - Docker and Docker Compose installed on the Laravel EC2
#
# IMPORTANT: Before running, create .env from .env.example and set:
#   1. HUB_IP → your monitoring hub private IP
#   2. INSTANCE_NAME → unique name per EC2
#   3. LARAVEL_LOG_DIR → Laravel storage/logs path on this EC2
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Grafana Alloy — Unified Collector Agent
  # ---------------------------------------------------------------------------
  # Collects logs and system metrics from the host.
  # Uses host networking for simple local host access.
  # Nginx and PHP-FPM log files are collected, but service-level exporter
  # metrics are intentionally not enabled.
  # ---------------------------------------------------------------------------
  alloy:
    image: grafana/alloy:v1.8.3
    container_name: alloy
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    network_mode: host
    pid: host
    volumes:
      # Alloy configuration
      - ./config.alloy:/etc/alloy/config.alloy:ro
      # Host filesystem access for system metrics (replaces Node Exporter)
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      # Laravel log files (read-only)
      - ${LARAVEL_LOG_DIR:?set LARAVEL_LOG_DIR in .env}:/host/logs/laravel:ro
      # Nginx and PHP-FPM logs (read-only)
      - /var/log/nginx:/host/logs/nginx:ro
      - /var/log:/host/logs/system:ro
      # Persistent storage for Alloy's WAL (Write-Ahead Log)
      - alloy-data:/var/lib/alloy/data
    environment:
      - HOSTNAME=${HOSTNAME:?set HOSTNAME in .env}
      - INSTANCE_NAME=${INSTANCE_NAME:?set INSTANCE_NAME in .env}
      - ENVIRONMENT=${ENVIRONMENT:?set ENVIRONMENT in .env}
      - TZ_NAME=${TZ_NAME:-Asia/Kuala_Lumpur}
      - PRIVATE_IPV4=${PRIVATE_IPV4:-unknown}
      - PUBLIC_IPV4=${PUBLIC_IPV4:-unknown}
      - HUB_IP=${HUB_IP:?set HUB_IP in .env}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "grep -q ':3039' /proc/net/tcp /proc/net/tcp6 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  alloy-data:
